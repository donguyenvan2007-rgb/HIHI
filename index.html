<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>System Breach</title>

<style>
body {
    margin: 0;
    background: black;
    color: lime;
    font-family: monospace;
    overflow: hidden;
    text-align: center;
}

#screen {
    padding-top: 80px;
    font-size: 22px;
}

.red { color: red; }

#final {
    display: none;
    color: white;
    position: relative;
    z-index: 2;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

video {
    margin-top: 20px;
    width: 300px;
    border: 3px solid red;
}

/* rung */
@keyframes shake {
    0% { transform: translate(2px, 2px); }
    50% { transform: translate(-2px, -2px); }
    100% { transform: translate(2px, -2px); }
}

.shake {
    animation: shake 0.1s infinite;
}
</style>
</head>

<body>

<!-- âm thanh -->
<audio id="scary" loop>
<source src="https://www.soundjay.com/human/sounds/scream-01.mp3">
</audio>

<audio id="calm" loop>
<source src="https://www.soundjay.com/nature/sounds/rain-01.mp3">
</audio>

<div id="screen">
    <h2 class="red">⚠ SYSTEM BREACH ⚠</h2>
    <p id="name"></p>
    <p>Đang truy cập camera...</p>
    <video id="cam" autoplay></video>
    <p id="progress">Đang hack: 0%</p>
</div>

<div id="final">
    <h1>😆 BỊ LỪA RỒI !!! 😆</h1>
    <p>🎉 Chúc chị Lan Phương và chị Thanh Thảo 🎉</p>
    <p>✨ Thi đâu trúng đó, làm bài đâu chắc đó ✨</p>
    <p>📚 Nhìn đề là hiểu, đọc câu là đúng 😆</p>
    <p>💯 Điểm cao ngất ngưởng, ai nhìn cũng nể 💯</p>
    <p>🔥 A+ rơi như mưa luôn 🔥</p>
</div>

<canvas id="matrix"></canvas>

<script>
let victimName = "Trương Lan Phương, Võ Lê Thanh Thảo";
document.getElementById("name").innerText = "Đã xác định mục tiêu: " + victimName;

// âm thanh
let scary = document.getElementById("scary");
let calm = document.getElementById("calm");

// cần click để chạy audio
document.body.addEventListener("click", () => {
    scary.play();
}, { once: true });

// fake camera (có thể xin quyền thật)
let video = document.getElementById("cam");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(() => {
    video.style.display = "none";
});

// chống thoát
window.onbeforeunload = function() {
    return "Bạn chắc chắn muốn thoát?";
};

// giả hack %
let percent = 0;
let progress = document.getElementById("progress");

let hack = setInterval(() => {
    percent += Math.floor(Math.random() * 10) + 1;
    if (percent > 100) percent = 100;

    progress.innerText = "Đang hack: " + percent + "%";

    if (percent >= 100) {
        clearInterval(hack);
        chaos();
    }
}, 200);


// hỗn loạn
function chaos() {
    document.body.classList.add("shake");
    scary.volume = 1;

    setTimeout(() => {
        document.getElementById("screen").innerHTML =
        "<h1 class='red'>📡 ĐANG GỬI DỮ LIỆU LÊN SERVER 📡</h1><p>KHÔNG THỂ DỪNG...</p>";
    }, 1000);

    setTimeout(() => {
        document.body.style.background = "red";
    }, 2000);

    setTimeout(() => {
        showFinal();
    }, 4500);
}


// kết thúc
function showFinal() {
    document.body.classList.remove("shake");
    document.body.style.background = "black";

    scary.pause();
    calm.play();

    document.getElementById("screen").style.display = "none";
    document.getElementById("final").style.display = "block";

    startMatrix();
}


// mưa A+
function startMatrix() {
    let canvas = document.getElementById("matrix");
    let ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    let letters = "A+";
    let fontSize = 20;
    let columns = canvas.width / fontSize;

    let drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "lime";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            let text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
            }

            drops[i]++;
        }
    }

    setInterval(draw, 33);
}
</script>

</body>
</html>
